<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Azure hub-and-spoke network</title>
  <desc id="desc">A hub virtual network with firewall, DNS, connectivity gateway, and three workload spokes.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#f8fafc">Hub-and-spoke landing zone network</text>
  <g font-family="Segoe UI, Arial" fill="#f8fafc" stroke="#38bdf8" stroke-width="3">
    <rect x="410" y="210" width="380" height="250" rx="22" fill="#1e293b"/>
    <text x="600" y="250" text-anchor="middle" font-size="28" font-weight="700">Hub VNet</text>
    <rect x="455" y="285" width="130" height="54" rx="10" fill="#334155"/>
    <text x="520" y="319" text-anchor="middle" font-size="18">Firewall</text>
    <rect x="615" y="285" width="130" height="54" rx="10" fill="#334155"/>
    <text x="680" y="319" text-anchor="middle" font-size="18">DNS</text>
    <rect x="520" y="365" width="160" height="54" rx="10" fill="#334155"/>
    <text x="600" y="399" text-anchor="middle" font-size="18">Gateway</text>
    <rect x="80" y="250" width="230" height="120" rx="18" fill="#1e293b"/>
    <text x="195" y="300" text-anchor="middle" font-size="24">Spoke A</text>
    <text x="195" y="335" text-anchor="middle" font-size="17">Production workload</text>
    <rect x="890" y="250" width="230" height="120" rx="18" fill="#1e293b"/>
    <text x="1005" y="300" text-anchor="middle" font-size="24">Spoke B</text>
    <text x="1005" y="335" text-anchor="middle" font-size="17">Application platform</text>
    <rect x="485" y="555" width="230" height="120" rx="18" fill="#1e293b"/>
    <text x="600" y="605" text-anchor="middle" font-size="24">Spoke C</text>
    <text x="600" y="640" text-anchor="middle" font-size="17">Shared workload</text>
    <line x1="310" y1="310" x2="410" y2="330"/>
    <line x1="790" y1="330" x2="890" y2="310"/>
    <line x1="600" y1="460" x2="600" y2="555"/>
    <rect x="430" y="115" width="340" height="58" rx="14" fill="#0f766e" stroke="#5eead4"/>
    <text x="600" y="151" text-anchor="middle" font-size="20">External / private connectivity</text>
    <line x1="600" y1="173" x2="600" y2="210" stroke="#5eead4"/>
  </g>
</svg>
