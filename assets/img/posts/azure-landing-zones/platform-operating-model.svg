<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise platform operating model</title>
  <desc id="desc">A platform operating model with service catalogue, backlog, releases, operations, exceptions, FinOps, and feedback.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#f8fafc">Enterprise platform operating model</text>
  <g font-family="Segoe UI, Arial" fill="#f8fafc" stroke="#38bdf8" stroke-width="3">
    <rect x="430" y="270" width="340" height="130" rx="18" fill="#0f766e" stroke="#5eead4"/>
    <text x="600" y="322" text-anchor="middle" font-size="26" font-weight="700">Platform product</text>
    <text x="600" y="358" text-anchor="middle" font-size="18">patterns, guardrails, automation</text>
    <rect x="80" y="155" width="240" height="78" rx="14" fill="#1e293b"/>
    <text x="200" y="187" text-anchor="middle" font-size="20">Service catalogue</text>
    <text x="200" y="213" text-anchor="middle" font-size="15">clear request paths</text>
    <rect x="480" y="125" width="240" height="78" rx="14" fill="#1e293b"/>
    <text x="600" y="157" text-anchor="middle" font-size="20">Backlog and roadmap</text>
    <text x="600" y="183" text-anchor="middle" font-size="15">prioritised improvements</text>
    <rect x="880" y="155" width="240" height="78" rx="14" fill="#1e293b"/>
    <text x="1000" y="187" text-anchor="middle" font-size="20">Release management</text>
    <text x="1000" y="213" text-anchor="middle" font-size="15">planned change</text>
    <rect x="80" y="475" width="240" height="78" rx="14" fill="#1e293b"/>
    <text x="200" y="507" text-anchor="middle" font-size="20">Operations</text>
    <text x="200" y="533" text-anchor="middle" font-size="15">incidents and problems</text>
    <rect x="480" y="525" width="240" height="78" rx="14" fill="#1e293b"/>
    <text x="600" y="557" text-anchor="middle" font-size="20">Exceptions</text>
    <text x="600" y="583" text-anchor="middle" font-size="15">owner, risk, expiry</text>
    <rect x="880" y="475" width="240" height="78" rx="14" fill="#1e293b"/>
    <text x="1000" y="507" text-anchor="middle" font-size="20">FinOps cadence</text>
    <text x="1000" y="533" text-anchor="middle" font-size="15">cost action loop</text>
    <line x1="320" y1="194" x2="430" y2="300"/>
    <line x1="600" y1="203" x2="600" y2="270"/>
    <line x1="880" y1="194" x2="770" y2="300"/>
    <line x1="320" y1="514" x2="430" y2="370"/>
    <line x1="600" y1="525" x2="600" y2="400"/>
    <line x1="880" y1="514" x2="770" y2="370"/>
  </g>
</svg>
