<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Azure management group hierarchy</title>
  <desc id="desc">A simplified Azure management group hierarchy with platform, landing zones, sandbox, and decommissioned branches.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#f8fafc">Azure management group hierarchy</text>
  <g font-family="Segoe UI, Arial" font-size="22" fill="#f8fafc" stroke="#38bdf8" stroke-width="3">
    <rect x="420" y="110" width="360" height="64" rx="12" fill="#1e293b"/>
    <text x="600" y="150" text-anchor="middle">Tenant Root Group</text>
    <line x1="600" y1="174" x2="600" y2="220"/>
    <line x1="200" y1="220" x2="1000" y2="220"/>
    <line x1="200" y1="220" x2="200" y2="260"/>
    <line x1="470" y1="220" x2="470" y2="260"/>
    <line x1="730" y1="220" x2="730" y2="260"/>
    <line x1="1000" y1="220" x2="1000" y2="260"/>
    <rect x="80" y="260" width="240" height="64" rx="12" fill="#1e293b"/>
    <text x="200" y="300" text-anchor="middle">Platform</text>
    <rect x="350" y="260" width="240" height="64" rx="12" fill="#1e293b"/>
    <text x="470" y="300" text-anchor="middle">Landing Zones</text>
    <rect x="610" y="260" width="240" height="64" rx="12" fill="#1e293b"/>
    <text x="730" y="300" text-anchor="middle">Sandbox</text>
    <rect x="880" y="260" width="240" height="64" rx="12" fill="#1e293b"/>
    <text x="1000" y="300" text-anchor="middle">Decommissioned</text>
    <line x1="200" y1="324" x2="200" y2="380"/>
    <line x1="110" y1="380" x2="290" y2="380"/>
    <line x1="110" y1="380" x2="110" y2="420"/>
    <line x1="200" y1="380" x2="200" y2="420"/>
    <line x1="290" y1="380" x2="290" y2="420"/>
    <rect x="40" y="420" width="140" height="54" rx="10" fill="#334155"/>
    <text x="110" y="454" text-anchor="middle" font-size="17">Connectivity</text>
    <rect x="130" y="500" width="140" height="54" rx="10" fill="#334155"/>
    <text x="200" y="534" text-anchor="middle" font-size="17">Identity</text>
    <rect x="220" y="420" width="140" height="54" rx="10" fill="#334155"/>
    <text x="290" y="454" text-anchor="middle" font-size="17">Management</text>
    <line x1="470" y1="324" x2="470" y2="400"/>
    <line x1="390" y1="400" x2="550" y2="400"/>
    <line x1="390" y1="400" x2="390" y2="440"/>
    <line x1="550" y1="400" x2="550" y2="440"/>
    <rect x="310" y="440" width="160" height="54" rx="10" fill="#334155"/>
    <text x="390" y="474" text-anchor="middle" font-size="17">Production</text>
    <rect x="470" y="440" width="180" height="54" rx="10" fill="#334155"/>
    <text x="560" y="474" text-anchor="middle" font-size="17">Non-Production</text>
  </g>
</svg>
