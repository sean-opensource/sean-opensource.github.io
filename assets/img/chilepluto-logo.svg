<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Chilepluto connected planet logo</title>
  <desc id="desc">A connected planet and orbital ring logo with a CP monogram for Chilepluto.</desc>
  <defs>
    <linearGradient id="orbit" x1="64" y1="420" x2="448" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0284c7"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#164e63" stop-opacity="0.92"/>
      <stop offset="0.58" stop-color="#0f172a" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="#020617"/>
  <circle cx="256" cy="256" r="196" fill="url(#glow)" stroke="#1e293b" stroke-width="6"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="166" fill="none" stroke="#38bdf8" stroke-width="10" opacity="0.78"/>
    <path d="M115 168c70-58 176-77 258-35" fill="none" stroke="#5eead4" stroke-width="7" stroke-linecap="round" opacity="0.72"/>
    <path d="M123 351c69 55 175 70 256 26" fill="none" stroke="#0ea5e9" stroke-width="7" stroke-linecap="round" opacity="0.7"/>

    <g stroke="#22d3ee" stroke-width="4" opacity="0.82" stroke-linecap="round">
      <path d="M151 205 197 166 256 187 312 146 365 195"/>
      <path d="M143 307 205 335 267 310 330 350 383 307"/>
      <path d="M197 166 205 335" opacity="0.45"/>
      <path d="M256 187 267 310" opacity="0.45"/>
      <path d="M312 146 330 350" opacity="0.45"/>
      <path d="M365 195 383 307" opacity="0.45"/>
    </g>

    <g fill="#38bdf8" stroke="#cffafe" stroke-width="4" filter="url(#cyanGlow)">
      <circle cx="151" cy="205" r="10"/>
      <circle cx="197" cy="166" r="10"/>
      <circle cx="256" cy="187" r="11"/>
      <circle cx="312" cy="146" r="10"/>
      <circle cx="365" cy="195" r="12"/>
      <circle cx="143" cy="307" r="9"/>
      <circle cx="205" cy="335" r="10"/>
      <circle cx="267" cy="310" r="9"/>
      <circle cx="330" cy="350" r="10"/>
      <circle cx="383" cy="307" r="12"/>
    </g>

    <ellipse cx="256" cy="280" rx="225" ry="58" fill="none" stroke="url(#orbit)" stroke-width="18" stroke-linecap="round" transform="rotate(-19 256 280)"/>
    <ellipse cx="256" cy="280" rx="225" ry="58" fill="none" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round" opacity="0.55" transform="rotate(-19 256 280)"/>
    <circle cx="414" cy="199" r="18" fill="#22d3ee" stroke="#e0f2fe" stroke-width="5" filter="url(#cyanGlow)"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="256" y="282" font-size="128" fill="#f8fafc" letter-spacing="-8">CP</text>
  </g>
</svg>
