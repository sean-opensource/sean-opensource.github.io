<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Chilepluto logo</title>
  <desc id="desc">A dark circular planet mark with orbit rings, cloud nodes, and a CP monogram for Chilepluto.</desc>
  <defs>
    <radialGradient id="planet" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="45%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <g filter="url(#softShadow)">
    <ellipse cx="256" cy="260" rx="214" ry="78" fill="none" stroke="url(#ring)" stroke-width="18" opacity="0.95" transform="rotate(-18 256 260)"/>
    <ellipse cx="256" cy="260" rx="180" ry="58" fill="none" stroke="#94a3b8" stroke-width="5" opacity="0.35" transform="rotate(-18 256 260)"/>
    <circle cx="256" cy="256" r="142" fill="url(#planet)" stroke="#e0f2fe" stroke-width="8"/>
    <path d="M160 210c28-46 78-75 136-75 42 0 80 16 108 43-28-15-60-23-94-23-69 0-129 34-164 86 2-11 6-22 14-31z" fill="#f8fafc" opacity="0.16"/>
    <path d="M168 334c38 42 92 66 151 58 37-5 70-22 96-47-31 14-66 22-103 22-56 0-106-17-144-33z" fill="#020617" opacity="0.22"/>
    <circle cx="105" cy="224" r="18" fill="#5eead4" stroke="#e0f2fe" stroke-width="5"/>
    <circle cx="414" cy="292" r="15" fill="#38bdf8" stroke="#e0f2fe" stroke-width="5"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="256" y="278" font-size="118" fill="#f8fafc" letter-spacing="-8">CP</text>
    <text x="256" y="324" font-size="26" fill="#dbeafe" letter-spacing="5">CHILEPLUTO</text>
  </g>
</svg>
