name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  workflow_dispatch:

  # Scheduled rebuilds allow future-dated posts to become visible.
  # GitHub cron runs in UTC, so two UTC times are used to cover Melbourne
  # standard time and daylight saving time. The first step below gates the
  # scheduled run so deployment only proceeds when Melbourne local time is
  # Monday or Friday at 9:00 AM.
  schedule:
    - cron: "0 23 * * 0,4"
    - cron: "0 22 * * 0,4"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # GitHub-hosted runners switch JavaScript actions to Node.js 24 on June 16, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check Melbourne publish window
        if: github.event_name == 'schedule'
        run: |
          day="$(TZ=Australia/Melbourne date +%u)"
          hour="$(TZ=Australia/Melbourne date +%H)"

          if { [ "$day" = "1" ] || [ "$day" = "5" ]; } && [ "$hour" = "09" ]; then
            echo "Scheduled publish window confirmed: Australia/Melbourne Monday/Friday 09:00."
          else
            echo "Not the Melbourne Monday/Friday 09:00 publish window. Skipping scheduled deployment."
            exit 78
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
