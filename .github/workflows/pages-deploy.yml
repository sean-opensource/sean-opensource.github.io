name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  workflow_dispatch:

  # Scheduled rebuilds allow future-dated posts to become visible.
  # GitHub cron runs in UTC, so two UTC times are used to cover Melbourne
  # standard time and daylight saving time. The first job below gates the
  # scheduled run so deployment only proceeds when Melbourne local time is
  # Monday or Friday at 9:00 AM.
  # Current editorial rhythm:
  # - Monday: existing technical queue and platform/automation notes.
  # - Friday: cloud governance, platform engineering, and Deep Learning hub articles.
  schedule:
    - cron: "0 23 * * 0,4"
    - cron: "0 22 * * 0,4"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Prefer the current JavaScript runtime for GitHub-hosted actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  publish-window:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.window.outputs.should_run }}
    steps:
      - name: Check Melbourne publish window
        id: window
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          day="$(TZ=Australia/Melbourne date +%u)"
          hour="$(TZ=Australia/Melbourne date +%H)"

          if { [ "$day" = "1" ] || [ "$day" = "5" ]; } && [ "$hour" = "09" ]; then
            echo "Scheduled publish window confirmed: Australia/Melbourne Monday/Friday 09:00."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the Melbourne Monday/Friday 09:00 publish window. Skipping scheduled deployment."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: publish-window
    if: needs.publish-window.outputs.should_run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
