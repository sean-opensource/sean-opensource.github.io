name: Bug report
description: Report a broken page, layout problem, or site behaviour issue.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What is the problem?
      description: Describe the issue clearly.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page URL
      description: Paste the page URL if available.
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: Browser, device, screenshots, or other useful context.
    validations:
      required: false
